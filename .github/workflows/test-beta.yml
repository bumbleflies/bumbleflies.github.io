name: Test Astro Beta

on:
  push:
    branches:
      - "*"
    paths:
      - "beta/**"
      - ".github/workflows/test-beta.yml"
  pull_request:
    branches:
      - "*"
    paths:
      - "beta/**"

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "beta/package-lock.json"

      - name: Install dependencies
        working-directory: beta
        run: npm ci

      - name: Run tests
        working-directory: beta
        run: npm test
