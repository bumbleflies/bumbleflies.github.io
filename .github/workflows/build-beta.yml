# This workflow builds the Astro-based beta site as a Docker image.
# It only pushes the 'beta' tag to the registry when running on the master branch.
# Branches and Pull Requests will build the image to verify correctness but will NOT push.
name: Build Astro Beta Image

on:
  push:
    branches:
      - master
      - feature/**
    paths:
      - beta/**
      - .github/workflows/build-beta.yml
  pull_request:
    paths:
      - beta/**
      - .github/workflows/build-beta.yml
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: bumblecode/web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        # Only log in if we are on master (production push)
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Only tag as 'beta' on master
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/master' }}
            # Use SHA tagging for other branches (local build context)
            type=sha,enable=${{ github.ref != 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: beta
          # Only push when on master branch
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
